<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email - Canvas LMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .result.success {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #065f46;
            display: block;
        }
        
        .result.error {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
            display: block;
        }
        
        .result.info {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            color: #1e40af;
            display: block;
        }
        
        .result h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .result pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .result ul {
            margin-left: 20px;
            margin-top: 10px;
        }
        
        .result li {
            margin: 5px 0;
        }
        
        .info-box {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #4b5563;
        }
        
        .info-box strong {
            color: #1f2937;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Email Service</h1>
        <p class="subtitle">Canvas LMS - Resend Integration Test</p>
        
        <div class="info-box">
            <strong>⚠️ Lưu ý:</strong> Với tài khoản Resend miễn phí, bạn chỉ có thể gửi email đến địa chỉ email đã đăng ký tài khoản Resend.
        </div>
        
        <form id="testForm">
            <div class="form-group">
                <label for="email">📧 Email nhận test:</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required
                >
            </div>
            
            <button type="submit" id="submitBtn">
                Gửi Test Email
            </button>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const form = document.getElementById('testForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Đang gửi...';
            
            // Clear previous result
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/test-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ ${data.message}</h3>
                        <p><strong>Email ID:</strong> ${data.data.emailId}</p>
                        <p><strong>Test OTP:</strong> ${data.data.testOTP}</p>
                        <p><strong>Gửi từ:</strong> ${data.data.from}</p>
                        <p><strong>Gửi đến:</strong> ${data.data.to}</p>
                        <p style="margin-top: 15px;"><strong>Các bước tiếp theo:</strong></p>
                        <ul>
                            ${data.nextSteps.map(step => `<li>${step}</li>`).join('')}
                        </ul>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    let errorHtml = `
                        <h3>❌ ${data.error}</h3>
                        <p>${data.message || ''}</p>
                    `;
                    
                    if (data.details) {
                        errorHtml += `<pre>${JSON.stringify(data.details, null, 2)}</pre>`;
                    }
                    
                    if (data.troubleshooting) {
                        errorHtml += `
                            <p style="margin-top: 15px;"><strong>${data.troubleshooting.message}</strong></p>
                            <ul>
                                ${data.troubleshooting.checks.map(check => `<li>${check}</li>`).join('')}
                            </ul>
                        `;
                    }
                    
                    resultDiv.innerHTML = errorHtml;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Lỗi kết nối</h3>
                    <p>${error.message}</p>
                    <p style="margin-top: 10px;">Vui lòng kiểm tra:</p>
                    <ul>
                        <li>Server có đang chạy không?</li>
                        <li>Kết nối mạng có ổn định không?</li>
                    </ul>
                `;
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Gửi Test Email';
            }
        });
    </script>
</body>
</html>
